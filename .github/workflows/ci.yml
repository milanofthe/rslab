name: ci

# Static + test gate for the pure-Rust workspace. The Python wheels are built
# separately in publish.yml; this workflow only touches the cargo workspace,
# which is 100% pure Rust (the vendored ordering crates carry no C/build.rs), so
# it builds on a stock ubuntu runner with no system libraries.
#
# COST POLICY: CI is a fast static + unit gate ONLY — hard 5-minute budget.
# Benchmarks and study runs (benches/, report data) are local-only via make;
# they never run on CI. The matgen feature is a strict superset of the default
# build, so one clippy pass and one test pass with it cover both configurations.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins `stable` + rustfmt/clippy; honour it here.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # A timed-out cold run must still seed the cache so the retry is warm.
          cache-on-failure: true

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy (all targets, matgen superset)
        # matgen is additive: this single pass lints the default code plus the
        # matgen-gated benches and integration test in one build.
        run: cargo clippy --all-targets --features matgen -- -D warnings

      - name: test (matgen superset)
        # Runs the full lib test set plus the matgen-gated tests in one pass.
        run: cargo test --features matgen
