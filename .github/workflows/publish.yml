name: publish

# Build the RSLAB Python wheels with maturin across platforms and publish them
# to PyPI via trusted publishing (OIDC, no API token). Runs on a version tag
# (`v*`) or manual dispatch. The bindings live in `python/`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Version-consistency gate: the wheel version comes from python/Cargo.toml
  # (maturin's single source of truth), NOT from the tag or the root crate.
  # v0.21.0 shipped 0.20.0-named wheels because python/Cargo.toml was not
  # bumped - PyPI then rejected the whole upload ("file already exists")
  # after all six build jobs had run. Fail here, first and fast, instead.
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tag == root crate version == python crate version
        run: |
          root_v=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          py_v=$(grep -m1 '^version' python/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "root=$root_v python=$py_v ref=$GITHUB_REF_NAME"
          if [ "$root_v" != "$py_v" ]; then
            echo "::error::python/Cargo.toml ($py_v) != Cargo.toml ($root_v)"; exit 1
          fi
          case "$GITHUB_REF" in
            refs/tags/v*)
              tag_v="${GITHUB_REF_NAME#v}"
              if [ "$tag_v" != "$root_v" ]; then
                echo "::error::tag v$tag_v != crate version $root_v"; exit 1
              fi ;;
          esac

  linux:
    runs-on: ubuntu-latest
    needs: version-check
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: auto
          working-directory: python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: python/dist

  windows:
    runs-on: windows-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          sccache: "true"
          working-directory: python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: python/dist

  macos:
    runs-on: macos-latest
    needs: version-check
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
          working-directory: python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: python/dist

  sdist:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    # Trusted publishing requires this environment and an OIDC token. Configure
    # the `pypi` environment on PyPI's "trusted publisher" settings for the
    # `rslab` project, pointing at this repo / `publish.yml` / environment.
    environment:
      name: pypi
      url: https://pypi.org/project/rslab/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
