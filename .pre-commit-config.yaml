# pre-commit hooks for rslab
#
# Install once per clone:    pre-commit install
# Run manually on all files: pre-commit run --all-files
#
# These hooks are the *exact same static checks* run by
# .github/workflows/ci.yml, so a local pre-commit pass implies the CI
# fmt + clippy gates pass too. The heavier `cargo test` is CI-only - it is
# too slow for a pre-commit hook.
#
# Toolchain: the pinned `stable` channel from `rust-toolchain.toml` (with the
# `rustfmt` + `clippy` components) so local and CI lint output match.

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --check --
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy --all-targets -- -D warnings
        # Lints the whole default build set - lib, bins, tests, and the
        # feature-free benches. The no-unwrap / no-expect policy is enforced by
        # `#![cfg_attr(not(test), deny(clippy::unwrap_used))]` at the top of
        # src/lib.rs, which clippy catches here.
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
